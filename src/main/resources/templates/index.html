<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>EDUCR - Inicio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .landing-container {
            text-align: center;
            padding: 5rem;
        }
        .features {
            margin: 3rem 0;
        }
    </style>
</head>
<body>
    <div class="container landing-container">
        <h1>Bienvenido a EDUCR</h1>
        <p class="lead">Plataforma de educación en línea</p>
        
        <div class="features">
            <div class="row">
                <div class="col-md-4">
                    <h3><i class="fas fa-book"></i> Cursos Variados</h3>
                    <p>Accede a nuestra amplia variedad de cursos educativos.</p>
                </div>
                <div class="col-md-4">
                    <h3><i class="fas fa-chalkboard-teacher"></i> Expertos</h3>
                    <p>Aprende de profesionales con amplia experiencia.</p>
                </div>
                <div class="col-md-4">
                    <h3><i class="fas fa-certificate"></i> Certificados</h3>
                    <p>Obtén certificados al completar tus cursos.</p>
                </div>
            </div>
        </div>
        
        <a href="/acceso" class="btn btn-primary btn-lg">Acceder</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</html>
