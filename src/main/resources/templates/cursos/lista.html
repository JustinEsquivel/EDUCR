<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/plantilla}">
<head>
    <title>EDUCR - Todos los Cursos</title>
    <meta charset="UTF-8"/>
    <link th:href="@{/webjars/bootstrap/css/bootstrap.min.css}" rel="stylesheet"/>
    <link th:href="@{/webjars/font-awesome/css/all.css}" rel="stylesheet"/>
    <script th:src="@{/webjars/jquery/jquery.min.js}"></script>
    <script th:src="@{/webjars/popper.js/umd/popper.min.js}"></script>
    <script th:src="@{/webjars/bootstrap/js/bootstrap.min.js}"></script>
    <style>
        .card-header {
            background-color: #004d00;
            color: white;
        }
        .card-body {
            background-color: #f8f9fa;
        }
        .navbar {
            background-color: #343a40;
        }
        .btn-custom {
            background-color: #28a745;
            color: white;
        }
        footer {
            background-color: #343a40;
            color: white;
        }
        .card-footer {
            background-color: #f8f9fa;
        }
    </style>
</head>
<body style="background-color: #f8f9fa;">

    <!-- Header -->
    <header th:fragment="header" class="header">
        <nav class="navbar navbar-expand-lg navbar-dark p-3">
            <div class="container">
                <a th:href="@{/}" class="navbar-brand mb-0 h1">EDUCR</a>
                <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navbarCollapse">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarCollapse">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                        <li class="nav-item px-3">
                            <!-- Cambio aquí a "Todos los cursos" -->
                            <a class="nav-link" th:href="@{/cursos}">Todos los cursos</a>
                        </li>
                    </ul>
                    <ul class="navbar-nav">
                        <li class="nav-item px-3"><a class="nav-link" th:href="@{/(lang=es)}">ES</a></li>
                        <li class="nav-item px-3"><a class="nav-link" th:href="@{/(lang=en)}">EN</a></li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <!-- Main Content -->
    <div layout:fragment="content">
        <div class="container mt-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h1>Todos los cursos</h1>
                <a th:href="@{/dashboard}" class="btn btn-outline-secondary">
                    <i class="fas fa-arrow-left"></i> Volver al Dashboard
                </a>
            </div>

            <div class="row">
                <div th:each="curso : ${cursos}" class="col-md-4 mb-4">
                    <div class="card h-100">
                        <div class="card-body">
                            <h5 class="card-title" th:text="${curso.nombre}"></h5>
                            <p class="card-text" th:text="${curso.descripcion}"></p>
                            <p class="text-muted small">
                                Creado por: <span th:text="${curso.creadoPor.nombre}"></span>
                            </p>
                        </div>
                        <div class="card-footer bg-transparent">
                            <a th:href="@{/cursos/{id}(id=${curso.idCurso})}" 
                               class="btn btn-primary">
                                Ver detalles
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-dark text-white mt-5 p-4">
        <div class="container text-center">
            <p class="lead">© EDUCR - Todos los derechos reservados</p>
        </div>
    </footer>

</body>
</html>
