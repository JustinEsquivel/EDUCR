<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <title>EDUCR - Iniciar Sesión</title>
        <link th:href="@{/webjars/bootstrap/css/bootstrap.min.css}" rel="stylesheet"/>
        <link th:href="@{/webjars/font-awesome/css/all.css}" rel="stylesheet"/>
        <style>
            body {
                background-color: #f8f9fa;
                display: flex;
                flex-direction: column;
                min-height: 100vh;
            }
            .login-container {
                flex: 1;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 2rem 0;
            }
            .card-login {
                border: none;
                border-radius: 10px;
                box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
                width: 100%;
                max-width: 500px;
            }
            .card-header {
                background-color: #004d00;
                color: white;
                border-radius: 10px 10px 0 0 !important;
                padding: 1.5rem;
            }
            .card-body {
                padding: 2rem;
            }
            .btn-login {
                background-color: #28a745;
                border: none;
                padding: 0.5rem 1.5rem;
            }
            .btn-login:hover {
                background-color: #218838;
            }
            .form-control:focus {
                border-color: #28a745;
                box-shadow: 0 0 0 0.25rem rgba(40, 167, 69, 0.25);
            }
            .footer {
                background-color: #343a40;
                color: white;
                padding: 1.5rem 0;
                text-align: center;
            }
        </style>
    </head>
    <body>
        <header class="header">
            <nav class="navbar navbar-expand-lg navbar-dark p-3" style="background-color: #343a40;">
                <div class="container">
                    <a th:href="@{/}" class="navbar-brand mb-0 h1">EDUCR</a>
                    <div class="collapse navbar-collapse">
                        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                            <li class="nav-item px-3">
                                <a class="nav-link" th:href="@{/cursos}">Cursos</a>
                            </li>
                        </ul>
                    </div>
                </div>
            </nav>
        </header>

        <div class="login-container">
            <div class="container">
                <div class="row justify-content-center">
                    <div class="col-md-8 col-lg-6">
                        <div class="card card-login">
                            <div class="card-header text-center">
                                <h3><i class="fas fa-sign-in-alt me-2"></i>Iniciar Sesión</h3>
                            </div>
                            <div class="card-body">
                                <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                                    <span th:text="${error}"></span>
                                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                                </div>

                                <form th:action="@{/login}" method="post">
                                    <div class="mb-4">
                                        <label for="correo" class="form-label">
                                            <i class="fas fa-envelope me-2"></i>Correo Electrónico
                                        </label>
                                        <input type="email" class="form-control form-control-lg" 
                                               id="correo" name="correo" required
                                               placeholder="tucorreo@ejemplo.com">
                                    </div>
                                    <div class="mb-4">
                                        <label for="contraseña" class="form-label">
                                            <i class="fas fa-lock me-2"></i>Contraseña
                                        </label>
                                        <input type="password" class="form-control form-control-lg" 
                                               id="contraseña" name="contraseña" required
                                               placeholder="Ingresa tu contraseña">
                                    </div>
                                    <div class="d-grid mb-3">
                                        <button type="submit" class="btn btn-login btn-lg">
                                            <i class="fas fa-sign-in-alt me-2"></i>Iniciar Sesión
                                        </button>
                                    </div>
                                </form>

                                <div class="text-center mt-4">
                                    <p class="mb-2">¿No tienes una cuenta?</p>
                                    <a th:href="@{/registro}" class="btn btn-outline-success">
                                        <i class="fas fa-user-plus me-2"></i>Regístrate aquí
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>


        <footer class="bg-dark text-white mt-5 p-4">
            <div class="container text-center">
                <p class="lead">© [[#{plantilla.derechos}]]</p>
            </div>
        </footer>



        <script th:src="@{/webjars/jquery/jquery.min.js}"></script>
        <script th:src="@{/webjars/popper.js/umd/popper.min.js}"></script>
        <script th:src="@{/webjars/bootstrap/js/bootstrap.min.js}"></script>
    </body>
</html>
