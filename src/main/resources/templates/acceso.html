<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <title>EDUCR - Acceso</title>
        <link th:href="@{/webjars/bootstrap/css/bootstrap.min.css}" rel="stylesheet"/>
        <link th:href="@{/webjars/font-awesome/css/all.css}" rel="stylesheet"/>
        <style>
            body {
                background-color: #f8f9fa;
            }
            .card-header {
                background-color: #004d00;
                color: white;
            }
            .card-body {
                background-color: #f8f9fa;
            }
            .btn-custom {
                background-color: #28a745;
                color: white;
                border: none;
            }
            .btn-custom:hover {
                background-color: #218838;
                color: white;
            }
            .access-container {
                min-height: 80vh;
                display: flex;
                flex-direction: column;
                justify-content: center;
            }
            .card-access {
                transition: transform 0.3s ease;
                border: none;
                box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            }
            .card-access:hover {
                transform: translateY(-5px);
            }
        </style>
    </head>
    <body>

        <header class="header">
            <nav class="navbar navbar-expand-lg navbar-dark p-3" style="background-color: #343a40;">
                <div class="container">
                    <a th:href="@{/}" class="navbar-brand mb-0 h1">EDUCR</a>
                    <div class="collapse navbar-collapse">
                        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                            <li class="nav-item px-3">
                                <a class="nav-link" th:href="@{/cursos}">Cursos</a>
                            </li>
                        </ul>
                    </div>
                </div>
            </nav>
        </header>


        <div class="container access-container">
            <div class="row justify-content-center">
                <div class="col-md-8 text-center mb-4">
                    <h1 class="text-success">Acceso a EDUCR</h1>
                    <p class="lead">Selecciona cómo deseas acceder a la plataforma</p>
                </div>
            </div>

            <div class="row justify-content-center">
                <div class="col-md-5 mb-4">
                    <div class="card card-access h-100">
                        <div class="card-header">
                            <h3 class="text-center"><i class="fas fa-sign-in-alt me-2"></i>Iniciar Sesión</h3>
                        </div>
                        <div class="card-body text-center">
                            <p class="mb-4">¿Ya tienes una cuenta? Accede con tus credenciales.</p>
                            <a href="/login" class="btn btn-custom btn-lg">
                                <i class="fas fa-user me-2"></i>Ir a Login
                            </a>
                        </div>
                    </div>
                </div>

                <div class="col-md-5 mb-4">
                    <div class="card card-access h-100">
                        <div class="card-header">
                            <h3 class="text-center"><i class="fas fa-user-plus me-2"></i>Registrarse</h3>
                        </div>
                        <div class="card-body text-center">
                            <p class="mb-4">¿Nuevo en EDUCR? Crea una cuenta para comenzar.</p>
                            <a href="/registro" class="btn btn-custom btn-lg">
                                <i class="fas fa-edit me-2"></i>Crear Cuenta
                            </a>
                        </div>
                    </div>
                </div>
            </div>

            <div class="row justify-content-center mt-3">
                <div class="col-md-10 text-center">
                    <a href="/" class="btn btn-outline-secondary">
                        <i class="fas fa-arrow-left me-2"></i>Volver al Inicio
                    </a>
                </div>
            </div>
        </div>


        <footer class="bg-dark text-white mt-5 p-4">
            <div class="container text-center">
                <p class="lead">© [[#{plantilla.derechos}]]</p>
            </div>
        </footer>


        <script th:src="@{/webjars/jquery/jquery.min.js}"></script>
        <script th:src="@{/webjars/popper.js/umd/popper.min.js}"></script>
        <script th:src="@{/webjars/bootstrap/js/bootstrap.min.js}"></script>
    </body>
</html>
