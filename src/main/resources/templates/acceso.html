<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>EDUCR - Acceso</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8 text-center mb-4">
                <h1>Acceso a EDUCR</h1>
                <p class="lead">Selecciona cómo deseas acceder a la plataforma</p>
            </div>
        </div>
        
        <div class="row justify-content-center">
            <div class="col-md-5 mb-4">
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        <h3 class="text-center">Iniciar Sesión</h3>
                    </div>
                    <div class="card-body">
                        <p>¿Ya tienes una cuenta?</p>
                        <a href="/login" class="btn btn-primary">Ir a Login</a>
                    </div>
                </div>
            </div>
            
            <div class="col-md-5 mb-4">
                <div class="card">
                    <div class="card-header bg-success text-white">
                        <h3 class="text-center">Registrarse</h3>
                    </div>
                    <div class="card-body">
                        <p>¿Nuevo en EDUCR?</p>
                        <a href="/registro" class="btn btn-success">Crear Cuenta</a>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="row justify-content-center">
            <div class="col-md-10 text-center">
                <a href="/" class="btn btn-outline-secondary">Volver al Inicio</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
