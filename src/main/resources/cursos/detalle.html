<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/plantilla}">
<head>
    <title th:text="${curso.nombre} + ' - Detalles'"></title>
</head>
<body>
    <div layout:fragment="content">
        <div class="container mt-4">
            <div class="row">
                <div class="col-md-8">
                    <nav aria-label="breadcrumb">
                        <ol class="breadcrumb">
                            <li class="breadcrumb-item"><a th:href="@{/cursos}">Cursos</a></li>
                            <li class="breadcrumb-item active" aria-current="page" th:text="${curso.nombre}"></li>
                        </ol>
                    </nav>
                    
                    <h1 th:text="${curso.nombre}"></h1>
                    <p class="lead" th:text="${curso.descripcion}"></p>
                    
                    <div class="card mb-4">
                        <div class="card-body">
                            <h5 class="card-title">Información del curso</h5>
                            <dl class="row">
                                <dt class="col-sm-3">Creado por:</dt>
                                <dd class="col-sm-9" th:text="${curso.creadoPor.nombre} + ' ' + ${curso.creadoPor.apellido}"></dd>
                                
                                <dt class="col-sm-3">Fecha de creación:</dt>
                                <dd class="col-sm-9" th:text="${#temporals.format(curso.fechaCreacion, 'dd/MM/yyyy')}"></dd>
                            </dl>
                        </div>
                    </div>
                </div>
                
                <div class="col-md-4">
                    <div class="card">
                        <div class="card-body">
                            <h5 class="card-title">Acciones</h5>
                            
                            <div th:if="${estaInscrito != null and estaInscrito}">
                                <div class="alert alert-success">
                                    Ya estás inscrito en este curso
                                </div>
                                <a th:href="@{/perfil}" class="btn btn-success w-100">
                                    Ver en mi perfil
                                </a>
                            </div>
                            
                            <div th:unless="${estaInscrito != null and estaInscrito}">
                                <form th:action="@{/cursos/inscribir/{id}(id=${curso.idCurso})}" method="post">
                                    <button type="submit" class="btn btn-primary w-100">
                                        Inscribirse al curso
                                    </button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
